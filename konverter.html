<!DOCTYPE html>

<meta charset="UTF-8">

<title>Конвертер единиц измерения — Справочник конструктора</title>
<style>
  :root{
    --bg: #14161a;
    --panel: #1c1f26;
    --panel-2: #232732;
    --border: #2e3340;
    --text: #e6e8ec;
    --text-dim: #9aa1ae;
    --accent: #4f8cff;
    --accent-dim: #2c4a8c;
    --ok: #4fd18b;
  }
  *{ box-sizing: border-box; }
  body{
    margin:0;
    background: var(--bg);
    color: var(--text);
    font-family: "Segoe UI", Roboto, Arial, sans-serif;
    padding: 24px;
  }
  h1{
    font-size: 20px;
    font-weight: 600;
    margin: 0 0 4px 0;
  }
  .subtitle{
    color: var(--text-dim);
    font-size: 13px;
    margin-bottom: 24px;
  }
  .wrap{
    max-width: 720px;
    margin: 0 auto;
  }
  /* переключатель категорий */
  .tabs{
    display:flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 20px;
  }
  .tab{
    padding: 8px 14px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 13px;
    user-select: none;
    transition: all .15s;
  }
  .tab:hover{ border-color: var(--accent-dim); color: var(--text); }
  .tab.active{
    background: var(--accent-dim);
    border-color: var(--accent);
    color: #fff;
  }
  .card{
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }
  .row{
    display:flex;
    gap: 12px;
    align-items: center;
    margin-bottom: 14px;
  }
  .row label{
    width: 80px;
    color: var(--text-dim);
    font-size: 13px;
    flex-shrink: 0;
  }
  input[type="number"], select{
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 15px;
    width: 100%;
  }
  input[type="number"]:focus, select:focus{
    outline: none;
    border-color: var(--accent);
  }
  select{ cursor: pointer; }
  .swap-btn{
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    width: 36px; height: 36px;
    border-radius: 8px;
    cursor: pointer;
    flex-shrink: 0;
    font-size: 16px;
    display:flex; align-items:center; justify-content:center;
  }
  .swap-btn:hover{ color: var(--accent); border-color: var(--accent); }
  .result{
    margin-top: 8px;
    padding: 16px;
    background: var(--panel-2);
    border: 1px solid var(--accent-dim);
    border-radius: 10px;
    text-align: center;
  }
  .result .value{
    font-size: 28px;
    font-weight: 700;
    color: var(--ok);
  }
  .result .unit{
    color: var(--text-dim);
    font-size: 13px;
    margin-top: 4px;
  }
  /* справочная таблица соотношений */
  table{
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
    font-size: 12px;
  }
  th, td{
    padding: 6px 8px;
    border-bottom: 1px solid var(--border);
    text-align: left;
    color: var(--text-dim);
  }
  th{ color: var(--text); font-weight: 600; }
  .hint{
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 16px;
    line-height: 1.5;
  }
</style>
<link rel="stylesheet" href="site-header.css">
<link rel="stylesheet" href="site-footer.css">
</head>
<body>
<div class="wrap">
  <div id="site-header"></div>

  <h2 style="font-size:16px; font-weight:600; margin-bottom:16px; color:var(--text);">Конвертер единиц измерения</h2>

  <div class="tabs" id="tabs"></div>

  <div class="card">
    <div class="row">
      <label>Значение</label>
      <input type="number" id="inputValue" value="1" step="any">
    </div>
    <div class="row">
      <label>Из</label>
      <select id="fromUnit"></select>
      <button class="swap-btn" id="swapBtn" title="Поменять местами">⇄</button>
      <label style="width:auto; margin-left:0;">В</label>
      <select id="toUnit"></select>
    </div>

    <div class="result">
      <div class="value" id="resultValue">—</div>
      <div class="unit" id="resultUnit"></div>
    </div>

    <table id="refTable"></table>
    <div class="hint" id="hintText"></div>
  </div>
</div>

<div id="site-footer"></div>

  "м/с²": "метр на секунду в квадрате", "фут/с²": "фут на секунду в квадрате",
  "км/с²": "километр на секунду в квадрате", "км/ч/с": "километр в час за секунду",
  "g (9.80665 м/с²)": "стандартное ускорение свободного падения (g)",
  // Время
  "мс": "миллисекунда", "с": "секунда", "мин": "минута", "ч": "час", "сутки": "сутки",
  "день": "день", "декада (10 дн.)": "декада (10 дней)", "квартал (3 мес.)": "квартал (3 месяца)",
  "век (100 лет)": "век (100 лет)", "тысячелетие (1000 лет)": "тысячелетие (1000 лет)",
  "неделя": "неделя", "месяц (30 дн.)": "месяц (30 дней)", "год (365 дн.)": "год (365 дней)",
  // Углы
  "угл. секунда": "угловая секунда", "угл. минута": "угловая минута", "рад": "радиан",
  "градус": "градус", "гон (град)": "гон (градиан)", "оборот": "оборот (полный угол)",
  // Температура
  "°C": "градус Цельсия", "°F": "градус Фаренгейта", "K": "кельвин", "°Ra": "градус Ранкина",
  // Уклон
  "доли (i)": "доли единицы (i = h/l)", "соотношение 1:n": "соотношение (уклон 1 к n)",
  "%": "процент", "‰": "промилле", "°": "градус (угол наклона)"
};

// Единицы, которые предлагаются по умолчанию при переключении на категорию
// (наиболее употребимые в практике КЖ/КМ/АС; для прочих категорий берётся первая единица списка)
const DEFAULT_FROM_UNIT = {
  force: "кН", stress: "МПа", length: "м", area: "м²",
  mass: "т", density: "т/м³", speed: "м/с", angle: "градус", slope: "%"
};
const DEFAULT_TO_UNIT = {
  force: "Н", stress: "кгс/см²", length: "мм", area: "см²",
  mass: "кг", density: "кг/м³", speed: "км/ч", angle: "рад", slope: "соотношение 1:n"
};

let currentCategory = "force";

const tabsEl = document.getElementById("tabs");
const fromSel = document.getElementById("fromUnit");
const toSel = document.getElementById("toUnit");
const inputVal = document.getElementById("inputValue");
const resultValue = document.getElementById("resultValue");
const resultUnit = document.getElementById("resultUnit");
const refTable = document.getElementById("refTable");
const hintText = document.getElementById("hintText");
const swapBtn = document.getElementById("swapBtn");

// строим вкладки категорий
Object.keys(CATEGORIES).forEach(key => {
  const tab = document.createElement("div");
  tab.className = "tab" + (key === currentCategory ? " active" : "");
  tab.textContent = CATEGORIES[key].title;
  tab.dataset.key = key;
  tab.addEventListener("click", () => selectCategory(key));
  tabsEl.appendChild(tab);
});

function selectCategory(key){
  currentCategory = key;
  tabsEl.querySelectorAll(".tab").forEach(t => {
    t.classList.toggle("active", t.dataset.key === key);
  });
  buildUnitSelectors();
  buildRefTable();
  hintText.textContent = CATEGORIES[key].hint;
  convert();
}

function buildUnitSelectors(){
  const units = Object.keys(CATEGORIES[currentCategory].units);
  fromSel.innerHTML = units.map(u => `<option value="${u}">${u}</option>`).join("");
  toSel.innerHTML = units.map(u => `<option value="${u}">${u}</option>`).join("");

  const defaultFrom = DEFAULT_FROM_UNIT[currentCategory];
  const defaultTo = DEFAULT_TO_UNIT[currentCategory];

  if (defaultFrom && units.includes(defaultFrom)){
    fromSel.value = defaultFrom;
  } else {
    fromSel.selectedIndex = 0;
  }

  if (defaultTo && units.includes(defaultTo)){
    toSel.value = defaultTo;
  } else {
    // по умолчанию выбираем единицу, отличную от "из", для наглядности
    toSel.selectedIndex = Math.min(1, units.length - 1);
  }
}

function buildRefTable(){
  const cat = CATEGORIES[currentCategory];
  const units = cat.units;
  let rows = `<tr><th>Единица</th><th>В ${cat.base}</th><th>Название единицы измерения</th></tr>`;
  Object.keys(units).forEach(u => {
    const coefText = units[u]; // для температуры здесь строка-формула, для остальных — число
    const name = UNIT_NAMES[u] || "";
    rows += `<tr><td>${u}</td><td>${coefText}</td><td>${name}</td></tr>`;
  });
  refTable.innerHTML = rows;
}

// перевод температуры: сначала приводим к Кельвинам (абсолютная шкала),
// затем — из Кельвинов в целевую единицу
function toKelvin(value, unit){
  if (unit === "°C") return value + 273.15;
  if (unit === "°F") return (value - 32) * 5/9 + 273.15;
  if (unit === "°Ra") return value * 5/9;
  return value; // K
}
function fromKelvin(value, unit){
  if (unit === "°C") return value - 273.15;
  if (unit === "°F") return (value - 273.15) * 9/5 + 32;
  if (unit === "°Ra") return value * 9/5;
  return value; // K
}

// перевод уклона: приводим к безразмерным долям (i = h/l), затем — в целевую единицу.
// "Соотношение 1:n" — нелинейная (обратная) величина, поэтому не выражается коэффициентом.
function toSlopeDecimal(value, unit){
  if (unit === "%") return value / 100;
  if (unit === "‰") return value / 1000;
  if (unit === "соотношение 1:n") return value !== 0 ? 1 / value : 0;
  if (unit === "°") return Math.tan(value * Math.PI / 180);
  return value; // доли (i)
}
function fromSlopeDecimal(i, unit){
  if (unit === "%") return i * 100;
  if (unit === "‰") return i * 1000;
  if (unit === "соотношение 1:n") return i !== 0 ? 1 / i : Infinity;
  if (unit === "°") return Math.atan(i) * 180 / Math.PI;
  return i; // доли (i)
}

function formatNumber(result){
  if (result === 0) return "0";
  if (Math.abs(result) >= 1e9 || Math.abs(result) < 1e-9){
    return result.toExponential(4);
  }
  return parseFloat(result.toFixed(9)).toString();
}

function convert(){
  const cat = CATEGORIES[currentCategory];
  const value = parseFloat(inputVal.value);
  if (isNaN(value)){
    resultValue.textContent = "—";
    resultUnit.textContent = "";
    return;
  }

  let result;
  if (cat.isTemperature){
    result = fromKelvin(toKelvin(value, fromSel.value), toSel.value);
  } else if (cat.isSlope){
    result = fromSlopeDecimal(toSlopeDecimal(value, fromSel.value), toSel.value);
  } else {
    const baseValue = value * cat.units[fromSel.value];
    result = baseValue / cat.units[toSel.value];
  }

  const formatted = formatNumber(result);
  const displayValue = (toSel.value === "соотношение 1:n") ? `1 : ${formatted}` : formatted;
  resultValue.textContent = displayValue;
  resultUnit.textContent = `${value} ${fromSel.value} = ${displayValue} ${toSel.value}`;
}

swapBtn.addEventListener("click", () => {
  const tmp = fromSel.selectedIndex;
  fromSel.selectedIndex = toSel.selectedIndex;
  toSel.selectedIndex = tmp;
  convert();
});

[inputVal, fromSel, toSel].forEach(el => el.addEventListener("input", convert));

// инициализация
selectCategory(currentCategory);
</script>
