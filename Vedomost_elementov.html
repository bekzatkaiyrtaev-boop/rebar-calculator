<html lang="ru">
<head>
<meta charset="UTF-8">

<title>Ведомость деталей — Электронный справочник конструктора</title>
<style>
:root {
  --bg:    #0f1117;
  --bg2:   #181c27;
  --bg3:   #1e2333;
  --brd:   #252a3a;
  --acc:   #e8832a;
  --grn:   #00ff88;
  --red:   #ff4444;
  --dim:   #6b7194;
  --text:  #d4d8e8;
  --head:  #f0f2fa;
  --mono:  'JetBrains Mono','Fira Mono','Consolas',monospace;
  --sans:  'Inter','Segoe UI',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--sans);
  font-size:14px;
  min-height:100vh;
  padding:24px;
}
.page-wrap{
  max-width:960px;
  margin:0 auto;
}

/* Шапка */
.page-title{
  font-size:18px;font-weight:700;color:var(--head);
  font-family:var(--mono);letter-spacing:0.5px;
  margin-bottom:6px;
}
.page-sub{
  font-size:11px;color:var(--acc);font-family:var(--mono);
  letter-spacing:1px;margin-bottom:20px;
}

/* Таблица */
.vedomost{
  width:100%;border-collapse:collapse;
}

/* Заголовок таблицы */
.vedomost thead th{
  background:var(--bg2);
  color:var(--dim);
  font-size:13px;font-family:var(--mono);
  letter-spacing:1px;text-transform:uppercase;
  padding:10px 12px;
  border:1px solid var(--brd);
  font-weight:600;
  text-align:center;
  white-space:nowrap;
}

/* Строки */
.vedomost tbody tr{
  border-bottom:2px solid var(--brd);
}
.vedomost tbody td{
  border:1px solid var(--brd);
  padding:0;
  vertical-align:top;
}

/* Левая панель */
.td-left{
  background:var(--bg2);
  width:180px;
  min-width:180px;
  padding:12px;
  vertical-align:top;
}
.lfield{
  display:flex;flex-direction:column;gap:3px;
  margin-bottom:10px;
}
.lfield:last-child{margin-bottom:0;}
.lfield label{
  font-size:10px;color:var(--dim);
  font-family:var(--mono);letter-spacing:0.3px;
}
.lfield select,.lfield input{
  background:var(--bg3);
  border:1px solid var(--brd);
  border-radius:4px;
  color:var(--text);
  font-size:14px;
  font-family:var(--mono);
  padding:5px 8px;
  outline:none;
  width:100%;
  transition:border-color 0.12s;
}
.lfield select:focus,.lfield input:focus{border-color:var(--acc);}
.lfield input.ok {border-color:var(--grn);color:var(--grn);}
.lfield input.err{border-color:var(--red);color:var(--red);}
.r-hint{font-size:10px;font-family:var(--mono);margin-top:2px;min-height:13px;}
.r-hint.ok {color:var(--grn);}
.r-hint.err{color:var(--red);}

/* Правая панель — эскиз */
.td-sketch{
  background:#12151e;
  padding:0;
  text-align:center;
  vertical-align:top;
  width:100%;
  height:100%;
  position:relative;
}
.td-sketch-inner{
  display:flex;
  flex-direction:column;
  position:absolute;
  top:0;left:0;right:0;bottom:0;
}
.td-sketch svg{
  display:block;
  width:100%;
  height:100%;
  flex:1;
}


/* Кнопка добавить */
.btn-add{
  display:flex;align-items:center;gap:8px;
  margin-top:14px;
  padding:10px 18px;
  background:transparent;
  border:1px dashed rgba(232,131,42,0.4);
  border-radius:6px;
  color:var(--acc);
  font-size:14px;
  cursor:pointer;
  font-family:var(--sans);
  transition:all 0.12s;
}
.btn-add:hover{background:rgba(232,131,42,0.07);border-color:var(--acc);}

/* Норм. ссылка */
.norm-ref{
  margin-top:14px;
  font-size:10px;color:var(--dim);
  font-family:var(--mono);line-height:1.8;
  padding:8px 12px;
  border-left:2px solid rgba(232,131,42,0.25);
}
.norm-ref b{color:var(--acc);}

/* Столбец позиции */
.td-pos{
  background:var(--bg2);
  width:44px;
  min-width:44px;
  text-align:center;
  vertical-align:middle;
  padding:6px 4px;
  border:1px solid var(--brd);
}
.pos-input{
  background:transparent;
  border:none;
  border-bottom:1px solid var(--brd);
  color:var(--acc);
  font-size:13px;
  font-family:var(--mono);
  font-weight:700;
  text-align:center;
  width:36px;
  outline:none;
  padding:2px 0;
  transition:border-color 0.12s;
}
.pos-input:focus{ border-bottom-color:var(--acc); }

/* Float input */
#fi{
  position:fixed;display:none;z-index:999;
  background:#1e2333;border:2px solid var(--acc);
  border-radius:6px;color:#fff;
  font-size:15px;font-family:var(--mono);
  padding:5px 9px;width:100px;
  text-align:center;outline:none;
  box-shadow:0 4px 20px rgba(0,0,0,0.7);
}
</style>

<table class="vedomost" id="mainTable">

<div class="norm-ref">
  <b>EN 1992-1-1 Табл.8.1N</b> · r_min = (don_min + d)/2 · don_min = 4∅ (∅≤16) / 7∅ (∅>16)<br>
  Длина считается по средней оси · <b>Кликните на A или B</b> на эскизе чтобы изменить
</div>

</div>

<div id="site-footer"></div>

<input type="number" id="fi" min="0">

<script>
const PI = Math.PI;

/* ── Линейная масса арматуры, кг/м (по ГОСТ) ── */
const REBAR_MASS = {
  3:0.055, 4:0.099, 5:0.154, 6:0.222, 7:0.302, 8:0.395,
  10:0.617, 12:0.888, 14:1.210, 16:1.580, 18:2.000, 20:2.470,
  22:2.980, 25:3.850, 28:4.830, 32:6.310, 36:7.990, 40:9.870
};
function calcMass(d, Lmm){
  const q = REBAR_MASS[d] || (Math.PI/4*(d/1000)**2*7850);
  return q * Lmm / 1000; // кг
}

/* ── Классы и диаметры по ГОСТ 34028-2016 / ГОСТ 6727-80 ── */
const CLASS_DIAMS = {
  'А240': [6,8,10,12,14,16,18,20,22,25,28,32,36,40],
  'А400': [6,8,10,12,14,16,18,20,22,25,28,32,36,40],
  'А500': [6,8,10,12,14,16,18,20,22,25,28,32,36,40],
  'А600': [10,12,14,16,18,20,22,25,28,32,36,40],
  'В500': [3,4,5,6,7,8,10,12],
};
const CLASSES = Object.keys(CLASS_DIAMS);

const TYPES = [
  {id:'L', name:'Г-образный'},
  {id:'U', name:'П-образный'},
  {id:'S', name:'Отгиб арм.'},
  {id:'R', name:'Хомут прям.'},
  {id:'H', name:'Шпилька'},
  {id:'X', name:'Универсальный'},
];

/* ── Норма ── */
function getDonMin(d){ return d<=16 ? 4*d : 7*d; }
function getRmin(d)  { return (getDonMin(d)+d)/2; }
function arcLen(r,alpha){ return r*alpha*PI/180; }
function cutLen(r,alpha){ return r*Math.tan(alpha/2*PI/180); }
function minC(d){ return Math.max(5*d, 50); }

/* ── Расчёт L ── */
function calcL(s){
  const {type,d,r,A,B,C,D} = s;
  const Ld90  = arcLen(r,90);
  const cut90 = cutLen(r,90);
  switch(type){
    case 'L': return A + Ld90 + B;
    case 'U': return 2*A + B + 2*arcLen(r,90);  // B — вертикальный участок между дугами
    case 'S': {
      // Расчёт через серверный API (формула скрыта на бэкенде)
      // Локальный fallback используется пока не пришёл ответ от сервера
      if(s._serverL !== undefined) return s._serverL;
      // fallback-расчёт (на случай отсутствия сети) — та же формула
      const dy    = D - 2*r;
      const d_oo  = Math.sqrt(B*B + dy*dy);
      const slope = Math.sqrt(Math.max(0, d_oo*d_oo - 4*r*r));
      const alpha = (Math.atan2(dy, B) + Math.asin(Math.min(1, 2*r/d_oo))) * 180/PI;
      const arc   = arcLen(r, Math.abs(alpha));
      return A + 2*arc + slope + C;
    }
    case 'R': {
      const Aax=A+d, Bax=B+d;
      return 2*(Aax+Bax) - 8*cut90 + 4*Ld90 + 2*minC(d);
    }
    case 'H': {
      const Aax=A+d;
      return Aax + 2*minC(d) + 2*Ld90 - 4*cut90;
    }
    case 'X': {
      if(!s.segs||s.segs.length===0) return 0;
      let Lx=s.segs.filter(sg=>sg.type==='len').reduce((a,sg)=>a+(sg.len||0),0);
      s.segs.filter(sg=>sg.type==='angle').forEach(sg=>{ Lx+=arcLen(sg.r||r,Math.abs(sg.angle||0)); });
      return Lx;
    }
  }
  return 0;
}

/* ── Дефолты ── */
function getDefaults(type, d){
  const r = getRmin(d);
  const c = minC(d);
  switch(type){
    case 'L': return {A:500, B:200, r};
    case 'U': return {A:500, B:200, r};
    case 'S': return {A:500, B:600, C:400, D:d, r};
    case 'R': return {A:400, B:300, C:c, r};
    case 'H': return {A:400, B:c,   r};
    case 'X': return {segs:[{type:'len',len:500},{type:'angle',angle:90,r:getRmin(d)},{type:'len',len:300}], startAngle:0};
  }
  return {A:500, B:200, r};
}

/* ── Строки ── */
let rowId=0;
let posCounter=0; // счётчик для авто-нумерации
const rows={};

function addRow(){
  rowId++;
  posCounter++;
  const id=rowId;
  const cls='А500', d=12, type='L';
  rows[id] = { type, cls, d, pos: String(posCounter), ...getDefaults(type,d) };
  const tr=document.createElement('tr');
  tr.id=`row-${id}`;
  tr.innerHTML=`
    <td class="td-pos" id="pos-${id}"></td>
    <td class="td-left"   id="left-${id}"></td>
    <td class="td-sketch" id="sketch-${id}"></td>
  `;
  document.getElementById('tbody').appendChild(tr);
  renderPos(id);
  renderLeft(id);
  renderSketch(id);
  if(type==='S') fetchServerL(id);
}

/* ── Ячейка позиции ── */
function renderPos(id){
  const s=rows[id];
  document.getElementById(`pos-${id}`).innerHTML=
    `<input class="pos-input" type="text" value="${s.pos||id}"
      maxlength="10"
      onchange="rows[${id}].pos=this.value"
      title="Позиция / маркировка">`;
}

/* ── Левая панель ── */
function renderLeft(id){
  const s=rows[id];
  const diams = CLASS_DIAMS[s.cls] || CLASS_DIAMS['А500'];
  const rmin  = getRmin(s.d);
  let html = `
    <div class="lfield">
      <label>Тип стержня</label>
      <select onchange="onType(${id},this.value)">
        ${TYPES.map(t=>`<option value="${t.id}"${t.id==s.type?' selected':''}>${t.name}</option>`).join('')}
      </select>
    </div>
    <div class="lfield">
      <label>Класс арматуры</label>
      <select onchange="onCls(${id},this.value)">
        ${CLASSES.map(c=>`<option${c==s.cls?' selected':''}>${c}</option>`).join('')}
      </select>
    </div>
    <div class="lfield">
      <label>&#8709; d, мм</label>
      <select onchange="onD(${id},this.value)">
        ${diams.map(v=>`<option value="${v}"${v==s.d?' selected':''}>${v}</option>`).join('')}
      </select>
    </div>
    <div style="font-size:10px;color:var(--dim);font-family:var(--mono);margin-top:6px;line-height:1.7;">
      r_min = ${rmin.toFixed(1)} мм${
        (s.type==='R'||s.type==='H')?
        `<br><span style="color:${(s.type==='R'?s.C:s.B)>=minC(s.d)?'var(--dim)':'#ff4444'}">c_min = max(5∅,50) = ${minC(s.d)} мм</span>`
        :(s.type==='L'||s.type==='U'||s.type==='X')?
        `<br><span style="color:var(--dim)">конец ≥ max(10∅,70) = ${minEnd(s.d)} мм</span>`:''
      }<br>
      <span style="opacity:0.7">${s.type==='S'?'Введите значения ниже':'Кликните цифры на эскизе чтобы изменить'}</span>
    </div>
    ${s.type==='S'?`
    <div style="margin-top:10px;display:flex;flex-direction:column;gap:6px;">
      ${[['A','A, мм',s.A],['B','B, мм (гор. проекция)',s.B],['C','C, мм',s.C],['D','D, мм (смещение осей)',s.D]].map(([key,lbl,val])=>`
      <div class="lfield">
        <label>${lbl}</label>
        <input type="number" value="${val}" min="1"
          style="background:var(--bg3);border:1px solid var(--brd);border-radius:4px;color:var(--text);font-size:14px;font-family:var(--mono);padding:5px 8px;outline:none;width:100%;"
          onchange="onSParam(${id},'${key}',this.value)">
      </div>`).join('')}
    </div>`:''}
  `;
  document.getElementById(`left-${id}`).innerHTML = html;
  // Для универсального — добавляем поля сегментов
  if(s.type==='X'){
    const xWrap = document.createElement('div');
    xWrap.id = `xfields-${id}`;
    xWrap.style.marginTop = '10px';
    document.getElementById(`left-${id}`).appendChild(xWrap);
    renderXFields(id);
  }
}

function renderXFields(id){
  const s=rows[id];
  const segs=s.segs||[];
  const wrap = document.getElementById(`xfields-${id}`);
  if(!wrap) return;
  let html = `
    <div style="font-size:10px;color:var(--acc);font-family:var(--mono);letter-spacing:1px;margin-bottom:6px;">НАЧАЛЬНЫЙ УГОЛ</div>
    <div style="display:flex;gap:5px;align-items:center;margin-bottom:10px;">
      <input type="number" value="${s.startAngle||0}" min="-180" max="180" placeholder="0"
        style="flex:1;background:#1a1e2e;border:1px solid var(--brd);border-radius:4px;color:var(--text);font-size:13px;font-family:var(--mono);padding:4px 7px;outline:none;"
        oninput="onXStartAngle(${id},this.value)">
      <span style="font-size:10px;color:var(--dim);">° (0=вправо, 90=вверх)</span>
    </div>
    <div style="font-size:10px;color:var(--acc);font-family:var(--mono);letter-spacing:1px;margin-bottom:6px;">СЕГМЕНТЫ</div>`;
  segs.forEach((seg,i)=>{
    if(seg.type==='len'){
      html+=`<div style="display:flex;gap:5px;align-items:center;margin-bottom:5px;">
        <span style="font-size:10px;color:var(--dim);font-family:var(--mono);min-width:16px;">${i+1}</span>
        <input type="number" value="${seg.len||0}" min="1" placeholder="длина, мм"
          style="flex:1;background:#1a1e2e;border:1px solid var(--brd);border-radius:4px;color:var(--text);font-size:13px;font-family:var(--mono);padding:4px 7px;outline:none;"
          oninput="onXSeg(${id},${i},'len',this.value)">
        <span style="font-size:10px;color:var(--dim);">мм</span>
        <button onclick="delXSeg(${id},${i})" style="background:none;border:none;color:var(--dim);cursor:pointer;font-size:13px;padding:0 3px;">✕</button>
      </div>`;
    } else {
      const segR=(seg.r||getRmin(rows[id].d));
      const rmin=getRmin(rows[id].d);
      const rOk=segR>=rmin;
      const rCol=rOk?'var(--grn)':'var(--red)';
      html+=`<div style="display:flex;gap:5px;align-items:center;margin-bottom:5px;">
        <span style="font-size:10px;color:#888aaa;font-family:var(--mono);min-width:16px;">⌒</span>
        <input type="number" value="${seg.angle||90}" min="-180" max="180" placeholder="угол °"
          style="width:54px;background:#1a1e2e;border:1px solid rgba(0,207,255,0.3);border-radius:4px;color:#00cfff;font-size:13px;font-family:var(--mono);padding:4px 5px;outline:none;"
          oninput="onXSeg(${id},${i},'angle',this.value)">
        <span style="font-size:10px;color:#00cfff;">°</span>
        <input type="number" value="${segR.toFixed(1)}" min="1" placeholder="r, мм"
          style="width:54px;background:#1a1e2e;border:1px solid ${rOk?'rgba(62,207,142,0.4)':'rgba(224,82,82,0.4)'};border-radius:4px;color:${rCol};font-size:13px;font-family:var(--mono);padding:4px 5px;outline:none;"
          oninput="onXSegR(${id},${i},this.value)" title="r_min=${rmin.toFixed(1)}мм">
        <span style="font-size:10px;color:${rCol};">r</span>
        <button onclick="delXSeg(${id},${i})" style="background:none;border:none;color:var(--dim);cursor:pointer;font-size:13px;padding:0 3px;">✕</button>
      </div>`;
    }
  });
  html+=`<div style="display:flex;gap:6px;margin-top:6px;">
    <button onclick="addXSeg(${id},'len')"
      style="flex:1;background:none;border:1px dashed rgba(232,131,42,0.4);border-radius:4px;color:var(--acc);font-size:11px;padding:5px;cursor:pointer;font-family:var(--sans);">+ участок</button>
    <button onclick="addXSeg(${id},'angle')"
      style="flex:1;background:none;border:1px dashed rgba(0,207,255,0.4);border-radius:4px;color:#00cfff;font-size:11px;padding:5px;cursor:pointer;font-family:var(--sans);">+ угол</button>
  </div>`;
  wrap.innerHTML = html;
}

function onXSeg(id,i,key,val){
  const v=parseFloat(val);
  if(!isNaN(v)) rows[id].segs[i][key]=v;
  renderSketch(id);
}
function onXSegR(id,i,val){
  const v=parseFloat(val);
  if(!isNaN(v)&&v>0){ rows[id].segs[i].r=v; renderXFields(id); renderSketch(id); }
}
function addXSeg(id,type){
  if(type==='len') rows[id].segs.push({type:'len',len:300});
  else rows[id].segs.push({type:'angle',angle:90,r:getRmin(rows[id].d)});
  renderXFields(id);
  renderSketch(id);
}
function delXSeg(id,i){
  rows[id].segs.splice(i,1);
  renderXFields(id);
  renderSketch(id);
}
function onXStartAngle(id,val){
  rows[id].startAngle=parseFloat(val)||0;
  renderSketch(id);
}


function onType(id,val){
  const {d,cls}=rows[id];
  rows[id]={ ...rows[id], type:val, ...getDefaults(val,d) };
  delete rows[id]._serverL;
  renderLeft(id); renderSketch(id);
  if(val==='S') fetchServerL(id);
}
function onCls(id,val){
  rows[id].cls=val;
  const diams=CLASS_DIAMS[val]||CLASS_DIAMS['А500'];
  // сбросить d на ближайший доступный
  if(!diams.includes(rows[id].d)) rows[id].d=diams[diams.length>5?4:0];
  rows[id].r=getRmin(rows[id].d);
  renderLeft(id); renderSketch(id);
}
function onD(id,val){
  rows[id].d=parseInt(val);
  rows[id].r=getRmin(rows[id].d);
  // обновить C и B для хомута/шпильки
  if(rows[id].type==='R') rows[id].C=minC(rows[id].d);
  if(rows[id].type==='H') rows[id].B=minC(rows[id].d);
  renderLeft(id); renderSketch(id);
  if(rows[id].type==='S') fetchServerL(id);
}
function onR_skip(){}  // r теперь только через эскиз
function onSParam(id,key,val){
  const v=parseFloat(val);
  const def=getDefaultForKey(id,key);
  rows[id][key]=(isNaN(v)||v<1)?def:v;
  delete rows[id]._serverL; // используем fallback пока сервер не ответит заново
  renderSketch(id);
  fetchServerL(id);
  // обновляем поле если было сброшено к дефолту
  if(isNaN(v)||v<1) renderLeft(id);
}

/* ── Запрос расчёта отгиба на сервер (формула скрыта на бэкенде) ── */
const CALC_API_URL = 'https://rebar-backend-henna.vercel.app/api/calc-s';
async function fetchServerL(id){
  const s=rows[id];
  if(s.type!=='S') return;
  try{
    const resp=await fetch(CALC_API_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({A:s.A,B:s.B,C:s.C,D:s.D,d:s.d,r:s.r})
    });
    if(!resp.ok) return; // тихо используем fallback
    const data=await resp.json();
    if(typeof data.L==='number'){
      s._serverL=data.L;
      renderSketch(id); // перерисовать с точным серверным значением
    }
  }catch(e){
    // нет сети / сервер недоступен — остаёмся на локальном fallback-расчёте
  }
}

/* ── Масштаб ── */
function scaleWarn(a,b){ return {wA:a/b>5, wB:a/b<0.2}; }
function scaleSvg(a,b,maxW,maxH,minA=60,minB=40){
  const ratio=a/b;
  let sA,sB;
  if(ratio>5)      { sA=maxW; sB=minB; }
  else if(ratio<0.2){ sA=minA; sB=maxH; }
  else { const sc=Math.min(maxW/a,maxH/b); sA=Math.max(a*sc,minA); sB=Math.max(b*sc,minB); }
  return {sA,sB};
}

/* ── Минимальная длина прямого конца (EN 1992-1-1 §8.5) ── */
function minEnd(d){ return Math.max(10*d, 70); }

/* ── Все типы → Canvas сегменты ── */
function sketchL(id,s){
  const {r,A,B,d}=s;
  const ok=v=>v>=minEnd(d);
  s._segs=[{type:'len',len:A},{type:'angle',angle:-90,r},{type:'len',len:B}];
  s._startAngle=0; s._keyMap={0:'A',2:'B'};
  s._labelColor={0:ok(A)?'#fff':'#ff4444', 2:ok(B)?'#fff':'#ff4444'};
}
function sketchU(id,s){
  const {r,A,B,d}=s;
  const ok=v=>v>=minEnd(d);
  s._segs=[{type:'len',len:A},{type:'angle',angle:-90,r},{type:'len',len:B},{type:'angle',angle:-90,r},{type:'len',len:A}];
  s._startAngle=0; s._keyMap={0:'A',2:'B',4:'A'};
  // первый (0) и последний (4) — оба A
  s._labelColor={0:ok(A)?'#fff':'#ff4444', 4:ok(A)?'#fff':'#ff4444'};
}
function sketchS(id,s){
  const {r,A,B,C:C_,D}=s;
  const dy    = D - 2*r;
  const d_oo  = Math.sqrt(B*B + dy*dy);
  const slope = Math.sqrt(Math.max(0, d_oo*d_oo - 4*r*r));
  const alpha = (Math.atan2(dy,B) + Math.asin(Math.min(1,2*r/d_oo))) * 180/Math.PI;
  // первый поворот +alpha (вверх), второй -alpha (обратно) → C параллелен A
  s._segs=[{type:'len',len:A},{type:'angle',angle:alpha,r},{type:'len',len:slope},{type:'angle',angle:-alpha,r},{type:'len',len:C_}];
  s._startAngle=0; s._keyMap={0:'A',2:'B',4:'C'};
}
function sketchR(id,s){
  const {r,A,B,C:C_,d}=s;
  const cOk = C_>=minC(d);
  s._segs=[
    {type:'len',len:C_},{type:'angle',angle:180,r},
    {type:'len',len:A},{type:'angle',angle:90,r},
    {type:'len',len:B},{type:'angle',angle:90,r},
    {type:'len',len:A},{type:'angle',angle:90,r},
    {type:'len',len:B},{type:'angle',angle:180,r},
    {type:'len',len:C_},
  ];
  const cCol=cOk?'#fff':'#ff4444';
  s._labelColor={0:cCol};          // только первый C; второй (10) скрыт
  // _labelSide: +1 = обычная сторона, -1 = противоположная (внутрь)
  // сегм 0 (C) стартует горизонтально вправо → перп. вверх (+1) это наружу хомута
  // нам нужно внутрь → -1
  // сегм 2 (A) идёт вертикально вниз → перп. влево (+1) это наружу (правильно)
  // сегм 4 (B) идёт горизонтально вправо → перп. вниз (+1) — наружу (правильно)
  s._labelSide={0:-1};             // C — внутрь хомута
  s._startAngle=0;
  s._hiddenSegs=[6,8,10];          // правая A, верхняя B, второй C — скрыты
  s._keyMap={2:'A',4:'B',0:'C'};
}
function sketchH(id,s){
  const {r,A,B:C_,d}=s;
  const cOk = C_>=minC(d);
  s._segs=[{type:'len',len:C_},{type:'angle',angle:-180,r},{type:'len',len:A},{type:'angle',angle:-180,r},{type:'len',len:C_}];
  s._labelColor={0:cOk?'#fff':'#ff4444', 4:cOk?'#fff':'#ff4444'};
  s._startAngle=0; s._hiddenSegs=[]; s._keyMap={2:'A',0:'B',4:'B'};
}

/* ── Canvas движок ── */
const canvasState={};
const labelHits={};

function initCanvas(id){
  if(!canvasState[id]) canvasState[id]={zoom:1,panX:0,panY:0,dragging:false,lastX:0,lastY:0};
}

function buildPath(segs,startAngle,r){
  let cx=0,cy=0,ang=startAngle*Math.PI/180;
  const cmds=[];
  segs.forEach((seg,i)=>{
    if(seg.type==='len'){
      const len=seg.len||0;
      const nx=cx+len*Math.cos(ang), ny=cy-len*Math.sin(ang);
      cmds.push({type:'line',x1:cx,y1:cy,x2:nx,y2:ny,ang,len,segIdx:i});
      cx=nx; cy=ny;
    } else {
      const aRad=(seg.angle||0)*Math.PI/180;
      const sr=seg.r||r;
      const pd=(seg.angle||0)>0?1:-1;
      const ocx=cx+Math.cos(ang+Math.PI/2*pd)*sr;
      const ocy=cy-Math.sin(ang+Math.PI/2*pd)*sr;
      const newAng=ang+aRad;
      const ex=ocx+Math.cos(newAng-Math.PI/2*pd)*sr;
      const ey=ocy-Math.sin(newAng-Math.PI/2*pd)*sr;
      const aS=-(ang-Math.PI/2*pd), aE=-(newAng-Math.PI/2*pd);
      cmds.push({type:'arc',x1:cx,y1:cy,x2:ex,y2:ey,ocx,ocy,sr,aS,aE,ccw:(seg.angle||0)>0,angleDeg:seg.angle||0,segIdx:i});
      cx=ex; cy=ey; ang=newAng;
    }
  });
  return cmds;
}

function getBBox(cmds){
  const xs=[0],ys=[0];
  cmds.forEach(c=>{
    xs.push(c.x1,c.x2); ys.push(c.y1,c.y2);
    if(c.type==='arc'){
      for(let k=0;k<=8;k++){
        const a=c.aS+(c.aE-c.aS)*k/8;
        xs.push(c.ocx+c.sr*Math.cos(a));
        ys.push(c.ocy+c.sr*Math.sin(a));
      }
    }
  });
  return {minX:Math.min(...xs),maxX:Math.max(...xs),minY:Math.min(...ys),maxY:Math.max(...ys)};
}

function drawOnCanvas(id){
  const s=rows[id];
  const canvas=document.getElementById('cv-'+id);
  if(!canvas) return;
  const W=canvas.width, H=canvas.height;
  if(!W||!H) return;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#12151e'; ctx.fillRect(0,0,W,H);

  const segs=s._segs||s.segs||[];
  if(!segs.length){
    ctx.fillStyle='#2a2f45'; ctx.font='14px monospace';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('Добавьте участки',W/2,H/2); return;
  }

  initCanvas(id);
  const st=canvasState[id];
  const cmds=buildPath(segs,s._startAngle!==undefined?s._startAngle:(s.startAngle||0),s.r);
  const bb=getBBox(cmds);
  const bW=bb.maxX-bb.minX||1, bH=bb.maxY-bb.minY||1;
  const PAD=50;
  const baseSc=Math.min((W-2*PAD)/bW,(H-2*PAD)/bH);
  const sc=baseSc*st.zoom;
  const cx0=(W-bW*sc)/2-bb.minX*sc+st.panX;
  const cy0=(H-bH*sc)/2-bb.minY*sc+st.panY;

  const hits=[]; // hit areas для клика
  const shownLd=new Set();
  const FS=15; // font size px — всегда фиксированный

  cmds.forEach(cmd=>{
    const x1=cmd.x1*sc+cx0, y1=cmd.y1*sc+cy0;
    const x2=cmd.x2*sc+cx0, y2=cmd.y2*sc+cy0;
    if(cmd.type==='line'){
      ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
      ctx.strokeStyle='#fff'; ctx.lineWidth=3; ctx.lineCap='round'; ctx.stroke();
      // Подпись
      const hidden=s._hiddenSegs&&s._hiddenSegs.includes(cmd.segIdx);
      if(!hidden){
        const mx=(x1+x2)/2, my=(y1+y2)/2;
        const isLast=(cmd.segIdx===segs.length-1);
        // _labelSide переопределяет сторону для конкретного сегмента
        let sign = isLast?-1:1;
        if(s._labelSide && s._labelSide[cmd.segIdx]!==undefined) sign=s._labelSide[cmd.segIdx];
        const px=Math.cos(cmd.ang+Math.PI/2)*22*sign;
        const py=-Math.sin(cmd.ang+Math.PI/2)*22*sign;
        const lx=mx+px, ly=my+py;
        const txt=String(Math.round(cmd.len));
        // цвет из _labelColor или белый по умолчанию
        const col=(s._labelColor&&s._labelColor[cmd.segIdx])||'#fff';
        ctx.font=`${FS}px monospace`; ctx.fillStyle=col;
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(txt,lx,ly);
        // Подчёркивание
        const tw=ctx.measureText(txt).width;
        ctx.beginPath(); ctx.moveTo(lx-tw/2,ly+FS/2+2); ctx.lineTo(lx+tw/2,ly+FS/2+2);
        ctx.strokeStyle=col; ctx.lineWidth=0.8; ctx.stroke();
        hits.push({x:lx-tw/2-4,y:ly-FS/2-2,w:tw+8,h:FS+8,segIdx:cmd.segIdx});
      }
    } else {
      const ocx=cmd.ocx*sc+cx0, ocy=cmd.ocy*sc+cy0, arcR=cmd.sr*sc;
      // дуга красная если это крайний сегмент универсального с ошибкой
      const arcCol=(s._labelColor&&s._labelColor[cmd.segIdx])||'#888aaa';
      ctx.beginPath(); ctx.arc(ocx,ocy,arcR,cmd.aS,cmd.aE,cmd.ccw);
      ctx.strokeStyle=arcCol; ctx.lineWidth=3; ctx.lineCap='round'; ctx.stroke();
      const ldKey=Math.round(Math.abs(cmd.angleDeg))+'_'+Math.round(cmd.sr);
      if(!shownLd.has(ldKey)){
        shownLd.add(ldKey);
        const Ld=arcLen(cmd.sr,Math.abs(cmd.angleDeg));
        const midA=(cmd.aS+cmd.aE)/2;
        const ldDist=arcR+26;
        const ldx=ocx+Math.cos(midA)*ldDist, ldy=ocy+Math.sin(midA)*ldDist;
        ctx.beginPath(); ctx.arc(ldx,ldy-FS/2-4,FS/2,-Math.PI,0);
        ctx.strokeStyle=arcCol; ctx.lineWidth=1.2; ctx.stroke();
        ctx.fillStyle=arcCol; ctx.font=`${FS-1}px monospace`;
        ctx.textAlign='center'; ctx.textBaseline='top';
        ctx.fillText(Ld.toFixed(1),ldx,ldy-2);
      }
    }
  });

  // ── Размер D для отгиба (S) — вертикаль между осями A и C ──
  if(s.type==='S' && cmds.length>=5){
    const yA = cmds[0].y2*sc+cy0;   // конец первого участка (начало дуги)
    const yC = cmds[4].y1*sc+cy0;   // начало третьего участка (после второй дуги)
    const xRight = Math.max(...cmds.map(c=>Math.max(c.x1*sc+cx0, c.x2*sc+cx0))) + 28;
    const col='#e8832a'; // оранжевый — отдельный параметр
    // вертикальные засечки
    const tick=7;
    ctx.strokeStyle=col; ctx.lineWidth=1.2; ctx.setLineDash([4,3]);
    ctx.beginPath(); ctx.moveTo(xRight-tick, yA); ctx.lineTo(xRight+tick, yA); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(xRight-tick, yC); ctx.lineTo(xRight+tick, yC); ctx.stroke();
    // вертикальная линия
    ctx.beginPath(); ctx.moveTo(xRight, yA); ctx.lineTo(xRight, yC); ctx.stroke();
    ctx.setLineDash([]);
    // стрелки
    const arh=6;
    [[xRight,yA,1],[xRight,yC,-1]].forEach(([ax,ay,dir])=>{
      ctx.beginPath();
      ctx.moveTo(ax,ay); ctx.lineTo(ax-4,ay+dir*arh); ctx.lineTo(ax+4,ay+dir*arh);
      ctx.closePath(); ctx.fillStyle=col; ctx.fill();
    });
    // подпись D — кликабельная
    const my=(yA+yC)/2;
    const txt=String(Math.round(s.D));
    ctx.font=`${FS}px monospace`; ctx.fillStyle=col;
    ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.fillText('D='+txt, xRight+8, my);
    const tw=ctx.measureText('D='+txt).width;
    // подчёркивание
    ctx.beginPath(); ctx.moveTo(xRight+8,my+FS/2+2); ctx.lineTo(xRight+8+tw,my+FS/2+2);
    ctx.strokeStyle=col; ctx.lineWidth=0.8; ctx.stroke();
    // hit-зона
    hits.push({x:xRight+6, y:my-FS/2-2, w:tw+4, h:FS+8, segIdx:'D'});
  }

  labelHits[id]=hits;
}

function attachCanvasEvents(id){
  const canvas=document.getElementById('cv-'+id);
  if(!canvas||canvas._eventsOk) return;
  canvas._eventsOk=true;
  initCanvas(id);
  const st=canvasState[id];

  canvas.addEventListener('wheel',e=>{
    e.preventDefault();
    st.zoom=Math.max(0.1,Math.min(20,st.zoom*(e.deltaY>0?0.85:1.18)));
    drawOnCanvas(id);
  },{passive:false});

  canvas.addEventListener('mousedown',e=>{
    st.dragging=true; st._moved=false;
    st.lastX=e.clientX; st.lastY=e.clientY;
    canvas.style.cursor='grabbing';
  });
  canvas.addEventListener('mousemove',e=>{
    if(!st.dragging) return;
    st._moved=true;
    st.panX+=e.clientX-st.lastX; st.panY+=e.clientY-st.lastY;
    st.lastX=e.clientX; st.lastY=e.clientY;
    drawOnCanvas(id);
  });
  canvas.addEventListener('mouseup',e=>{
    canvas.style.cursor='grab';
    if(!st._moved){
      const rect=canvas.getBoundingClientRect();
      const mx=(e.clientX-rect.left)*(canvas.width/rect.width);
      const my=(e.clientY-rect.top)*(canvas.height/rect.height);
      const hits=labelHits[id]||[];
      for(const h of hits){
        if(mx>=h.x&&mx<=h.x+h.w&&my>=h.y&&my<=h.y+h.h){
          // специальные хиты — внешние размерные линии
          if(h.segIdx==='D')     { startEdit(id,'D',e); break; }

          const km=rows[id]._keyMap||{};
          const key=km[h.segIdx];
          if(key) startEdit(id,key,e);
          else startEditX(id,h.segIdx,e);
          break;
        }
      }
    }
    st.dragging=false; st._moved=false;
  });
  canvas.addEventListener('mouseleave',()=>{st.dragging=false; canvas.style.cursor='grab';});

  // Двойной клик — сброс
  canvas.addEventListener('dblclick',()=>{st.zoom=1;st.panX=0;st.panY=0;drawOnCanvas(id);});
  // Средняя кнопка двойной клик
  let lastMid=0;
  canvas.addEventListener('auxclick',e=>{
    if(e.button===1){
      const now=Date.now();
      if(now-lastMid<400){st.zoom=1;st.panX=0;st.panY=0;drawOnCanvas(id);}
      lastMid=now;
    }
  });
}

/* ── Диспетчер эскизов ── */
function renderSketch(id){
  const s=rows[id];
  // Подготавливаем сегменты для canvas
  s._segs=null; s._startAngle=0; s._hiddenSegs=null; s._keyMap=null;
  switch(s.type){
    case 'L': sketchL(id,s); break;
    case 'U': sketchU(id,s); break;
    case 'S': sketchS(id,s); break;
    case 'R': sketchR(id,s); break;
    case 'H': sketchH(id,s); break;
    case 'X': {
      s._segs=s.segs||[]; s._startAngle=s.startAngle||0;
      // Валидация концов универсального
      const xSegs=s._segs;
      const xD=s.d;
      const minE=minEnd(xD);
      const lc={}; // _labelColor по segIdx
      // Первый сегмент
      if(xSegs.length>0){
        const first=xSegs[0];
        if(first.type==='angle') lc[0]='#ff4444';          // угол на конце — красный
        else if(first.len<minE)  lc[0]='#ff4444';           // слишком короткий
      }
      // Последний сегмент
      const li=xSegs.length-1;
      if(li>0){
        const last=xSegs[li];
        if(last.type==='angle') lc[li]='#ff4444';           // угол на конце
        else if(last.len<minE)  lc[li]='#ff4444';
      }
      s._labelColor=lc; // всегда перезаписываем — иначе старые красные остаются
      break;
    }
  }

  const {d,cls,r}=s;
  const rmin=getRmin(d);
  const L=calcL(s);
  const mass=calcMass(d, L);

  // Собираем уникальные R
  let rVals=[];
  const srcSegs=s._segs||[];
  srcSegs.filter(sg=>sg.type==='angle').forEach(sg=>{
    const rv=(sg.r||r).toFixed(1);
    if(!rVals.includes(rv)) rVals.push(rv);
  });
  if(!rVals.length) rVals=[r.toFixed(1)];
  const rOk=rVals.every(rv=>parseFloat(rv)>=rmin);
  const rCol=rOk?C.cyan:C.r_err;
  // Для универсального — каждый уникальный R кликабелен отдельно
  let rSpans='';
  if(s.type==='X'&&s.segs){
    // Группируем индексы сегментов по значению r
    const rGroups={};
    s.segs.forEach((sg,i)=>{
      if(sg.type==='angle'){
        const rv=(sg.r||r).toFixed(1);
        if(!rGroups[rv]) rGroups[rv]=[];
        rGroups[rv].push(i);
      }
    });
    rSpans=Object.entries(rGroups).map(([rv,idxs])=>{
      const ok=parseFloat(rv)>=rmin;
      const col=ok?C.cyan:C.r_err;
      return `<span style="color:${col};font-size:16px;cursor:pointer;margin-left:8px;"
        onclick="editSegR(${id},${JSON.stringify(idxs)},event)">R${rv}</span>`;
    }).join('');
  } else {
    rSpans=`<span style="color:${rCol};font-size:16px;cursor:pointer;"
      onclick="startEdit(${id},'r',event)">${rVals.map(rv=>`R${rv}`).join(', ')}</span>`;
  }

  const header=`<div style="display:flex;justify-content:space-between;align-items:center;
    padding:6px 12px;background:#12151e;border-bottom:1px solid #12151e;
    font-family:monospace;font-style:italic;flex-shrink:0;">
    <span style="color:${L>11700?'#ff4444':'#f0e030'};font-size:16px;font-weight:bold;">&#8709;${d} ${cls}, L=${Math.round(L)}, m=${mass.toFixed(3)} кг${L>11700?' ⚠ L>11700':''}</span>
    <span>${rSpans}</span>
  </div>`;

  const cell=document.getElementById(`sketch-${id}`);

  // Для отгиба — статичная картинка вместо canvas
  if(s.type==='S'){
    cell.innerHTML=`<div class="td-sketch-inner">${header}
      <div style="flex:1;min-height:0;overflow:hidden;display:flex;align-items:center;justify-content:center;padding:8px;">
        <img src="${SKETCH_S_IMG}" style="max-width:100%;max-height:100%;object-fit:contain;">
      </div>
    </div>`;
    return;
  }

  cell.innerHTML=`<div class="td-sketch-inner">${header}
    <canvas id="cv-${id}" style="display:block;width:100%;flex:1;min-height:0;cursor:grab;"></canvas>
  </div>`;

  requestAnimationFrame(()=>{
    const cv=document.getElementById('cv-'+id);
    if(!cv) return;
    const rect=cv.getBoundingClientRect();
    cv.width=Math.round(rect.width)||600;
    cv.height=Math.round(rect.height)||300;
    attachCanvasEvents(id);
    drawOnCanvas(id);
  });
}

/* ── Инлайн редактирование ── */
let editId=null, editKey=null;
const fi=document.getElementById('fi');

let _suppressBlur=false;

function startEdit(id,key,e){
  e.stopPropagation();
  editId=id; editKey=key;
  const val=rows[id][key];
  fi.value=key==='r'?(+val).toFixed(1):Math.round(val);
  fi.style.left=`${e.clientX-50}px`;
  fi.style.top =`${e.clientY-18}px`;
  fi.style.display='block';
  _suppressBlur=true;
  setTimeout(()=>{ _suppressBlur=false; fi.focus(); fi.select(); }, 50);
}

fi.addEventListener('keydown',e=>{
  if(e.key==='Enter'||e.key==='Tab'){e.preventDefault();commit();}
  if(e.key==='Escape') cancel();
});
document.addEventListener('mousedown',e=>{
  if(e.target!==fi&&fi.style.display==='block') commit();
});

/* Редактирование сегмента универсального */
let editSegIdx=null;

/* Редактирование сегмента универсального */

/* Дефолтное значение для конкретного ключа строки */
function getDefaultForKey(id, key){
  const s=rows[id];
  const d=s.d;
  if(key==='r') return getRmin(d);
  if(key==='C') return minC(d);
  if(key==='D') return rows[id].d;
  if((key==='A'||key==='B')&&(s.type==='L'||s.type==='U')) return Math.max(minEnd(d),200);
  if(key==='B' && s.type==='H') return minC(d);
  const def=getDefaults(s.type, d);
  return def[key]!==undefined ? def[key] : 100;
}

function commit(){
  if(!editId||!editKey) return;
  const v=parseFloat(fi.value);
  const empty=fi.value.trim()===''||isNaN(v)||v<1;

  if(editKey==='__segR__'){
    const rmin=getRmin(rows[editId].d);
    const rv=empty?rmin:v;
    const idxArr=Array.isArray(editSegIdx)?editSegIdx:[editSegIdx];
    idxArr.forEach(i=>{ rows[editId].segs[i].r=rv; });
    renderXFields(editId);
    renderSketch(editId);
    cancel(); return;
  } else if(editKey==='__seg__'){
    const val=empty?300:v;
    rows[editId].segs[editSegIdx].len=val;
    renderXFields(editId);
    renderSketch(editId);
  } else if(editKey==='r'){
    const val=empty?getRmin(rows[editId].d):v;
    rows[editId][editKey]=val;
    renderLeft(editId);
    renderSketch(editId);
  } else {
    const val=empty?getDefaultForKey(editId,editKey):v;
    rows[editId][editKey]=val;
    renderSketch(editId);
  }
  cancel();
}
function cancel(){ fi.style.display='none'; editId=null; editKey=null; editSegIdx=null; }
function startEditX(id,i,e){
  if(rows[id].type!=='X') return; // только для универсального
  e.stopPropagation();
  editId=id; editKey='__seg__'; editSegIdx=i;
  if(!rows[id].segs||!rows[id].segs[i]) return;
  fi.value=Math.round(rows[id].segs[i].len||0);
  fi.style.display='block';
  fi.style.left=`${e.clientX-50}px`;
  fi.style.top =`${e.clientY-18}px`;
  fi.focus(); fi.select();
}

/* Масштабирование шрифтов в SVG */
function rescaleFonts(id){
  const cell=document.getElementById(`sketch-${id}`);
  if(!cell) return;
  const svgs=cell.querySelectorAll('svg');
  svgs.forEach(svg=>{
    const rect=svg.getBoundingClientRect();
    if(!rect.width) return;
    const vb=svg.viewBox.baseVal;
    if(!vb||!vb.width) return;
    const scale=vb.width/rect.width;
    svg.querySelectorAll('[data-fixedfont]').forEach(el=>{
      const px=parseFloat(el.getAttribute('data-fixedfont'));
      el.setAttribute('font-size', (px*scale).toFixed(1));
    });
  });
}

// Перемасштабируем после каждого рендера
function rescaleAndRender(id){
  _origRenderSketch(id);
  requestAnimationFrame(()=>rescaleFonts(id));
}

// При изменении размера окна
window.addEventListener('resize',()=>{
  Object.keys(rows).forEach(id=>rescaleFonts(id));
});

/* Редактирование R группы сегментов */
function editSegR(id,idxs,e){
  e.stopPropagation();
  const s=rows[id];
  const curR=(s.segs[idxs[0]].r||s.r).toFixed(1);
  editId=id; editKey='__segR__'; editSegIdx=idxs;
  fi.value=curR;
  fi.style.left=`${e.clientX-50}px`;
  fi.style.top =`${e.clientY-18}px`;
  fi.style.display='block';
  _suppressBlur=true;
  setTimeout(()=>{ _suppressBlur=false; fi.focus(); fi.select(); }, 50);
}
