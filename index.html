<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Электронный справочник конструктора</title>
<link rel="stylesheet" href="site-header.css">
<link rel="stylesheet" href="site-footer.css">
<style>
  :root {
    --bg:         #0f1117;
    --surface:    #1a1d27;
    --surface2:   #22263a;
    --border:     #2e3347;
    --accent:     #4f8ef7;
    --accent2:    #7dd3a8;
    --text:       #d6daf0;
    --muted:      #6b7099;
    --mono:       'JetBrains Mono', 'Courier New', monospace;
    --sans:       'Inter', 'Segoe UI', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.55;
    padding: 24px 16px 48px;
  }

  .search-wrap { max-width: 760px; margin: 0 auto 32px; }
  #search {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    padding: 12px 16px;
    outline: none;
    transition: border-color .15s;
  }
  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--muted); }

  /* ── Книжное содержание ── */
  .toc { max-width: 760px; margin: 0 auto; }

  .toc-section { margin-bottom: 8px; }
  .toc-section-title {
    display: flex;
    align-items: baseline;
    gap: 10px;
    padding: 14px 4px 8px;
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    cursor: pointer;
    user-select: none;
  }
  .toc-section-title:hover { color: var(--accent); }
  .toc-section-title .num {
    color: var(--accent);
    font-family: var(--mono);
    min-width: 24px;
  }

  .chevron {
    display: inline-block;
    font-size: 11px;
    color: var(--muted);
    transition: transform .15s;
    transform: rotate(0deg);
  }
  .chevron.is-collapsed { transform: rotate(-90deg); }

  .toc-group-title {
    display: flex;
    align-items: baseline;
    gap: 8px;
    padding: 10px 4px 6px 30px;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .6px;
    color: var(--muted);
    margin-top: 6px;
    cursor: pointer;
    user-select: none;
  }
  .toc-group-title:hover { color: var(--accent); }
  .toc-group-title .num {
    font-family: var(--mono);
    color: var(--accent);
    text-transform: none;
    letter-spacing: 0;
  }
  .toc-group-title:first-of-type {
    margin-top: 0;
  }

  .toc-item {
    display: flex;
    align-items: baseline;
    gap: 10px;
    padding: 9px 4px 9px 34px;
    text-decoration: none;
    color: var(--text);
    border-radius: 6px;
    transition: background .12s;
  }
  .toc-item.toc-item-nested {
    padding-left: 58px;
  }
  .toc-item:hover { background: var(--surface); }
  .toc-item:hover .toc-title { color: var(--accent); }

  .toc-item .num {
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
    min-width: 34px;
    flex-shrink: 0;
  }
  .toc-item .toc-title {
    font-weight: 500;
    white-space: nowrap;
    transition: color .12s;
  }
  .toc-item .dots {
    flex: 1;
    border-bottom: 1px dotted var(--border);
    margin-bottom: 4px;
    min-width: 20px;
  }
  .toc-item .ref {
    color: var(--muted);
    font-family: var(--mono);
    font-size: 11px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .no-results { text-align: center; color: var(--muted); padding: 40px 0; font-size: 13px; }

  footer {
    max-width: 760px;
    margin: 24px auto 0;
    padding: 16px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 11px;
    color: var(--muted);
    text-align: left;
    line-height: 1.7;
  }
</style>
</head>
<body>

<div id="site-header"></div>

<div class="search-wrap">
  <input type="text" id="search" placeholder="Поиск калькулятора по названию или пункту норматива…">
</div>

<div class="toc" id="toc"></div>

<script>
/* ══════════════════════════════════════════════════════════════
   РЕЕСТР КАЛЬКУЛЯТОРОВ — книжное содержание с автонумерацией

   Ключевая идея: номера НИГДЕ не хранятся руками — они считаются
   на лету из позиции в массиве (индекс раздела + индекс элемента).
   Поэтому чтобы:
     • добавить новый калькулятор в середину раздела — просто
       вставьте объект в нужное место массива items, все номера
       после него сдвинутся сами при следующей загрузке страницы
     • переставить местами разделы — поменяйте местами объекты
       в массиве SECTIONS
     • вставить новый раздел — добавьте объект в любое место
       массива SECTIONS

   Поля раздела:
     title — название раздела (без номера! номер добавляется сам)
     items — массив калькуляторов этого раздела

   Поля калькулятора:
     title — название на карточке
     desc  — короткое описание (не показывается в содержании,
             используется только для поиска)
     ref   — пункт норматива, например "EN 1992-1-1 · §9.10"
     href  — путь к файлу калькулятора
   ══════════════════════════════════════════════════════════════ */

const SECTIONS = [
  {
    title: "Железобетонные конструкции",
    items: [
      {
        title: "Ведомость деталей",
        desc: "Радиусы отгиба арматуры, длины стержней по средней оси, эскизы форм A/B.",
        ref: "EN 1992-1-1 · Табл. 8.1N",
        href: "Vedomost_elementov.html"
      },
      {
        title: "Анкеровка и нахлёст арматуры",
        desc: "Базовая и требуемая длина анкеровки, длина нахлёста стержней с учётом условий сцепления и коэффициентов α.",
        ref: "EN 1992-1-1 · §8.4–8.7",
        href: "ankerovka-nahlest.html"
      },
      {
        title: "Защитный слой бетона",
        desc: "Расчёт c_min и c_nom по классу конструкции, условиям среды и допуску на отклонение.",
        ref: "СТ РК EN 1992-1-1 · §9.10",
        href: "zashitny-sloy.html"
      },
      {
        group: "Сборные железобетонные конструкции",
        items: [
          {
            title: "Железобетонные прогоны и опорные плиты",
            desc: "Сортамент железобетонных прогонов и опорных плит: размеры, класс бетона, расход материалов, масса, расчётная нагрузка.",
            ref: "Серия 1.225-2, выпуск 12",
            href: "progony-1225-2.html"
          },
          {
            title: "Подбор перемычек по серии 1.038.1-1",
            desc: "Матричный подбор сборных перемычек по ширине проёма, толщине стены (кладке) и расчётной нагрузке.",
            ref: "Серия 1.038.1-1",
            href: "peremychki.html"
          },
          {
            title: "Блоки бетонные для стен подвалов (ФБС)",
            desc: "Блоки бетонные для стен подвалов: размеры, класс бетона, монтажные петли, расход материалов, масса — по видам бетона (тяжёлый/лёгкий/силикатный).",
            ref: "ГОСТ 13579-2018",
            href: "fbs-13579-2018.html"
          }
        ]
      }
    ]
  },
  {
    title: "Металлические конструкции",
    items: [
      {
        title: "Двутавры по ГОСТ 26020-83",
        desc: "Сортамент нормальных, широкополочных и колонных двутавров, характеристики сечения и параметры стыка.",
        ref: "ГОСТ 26020-83 · EN 1993-1-1",
        href: "dvutavry-b.html"
      },
      {
        title: "Двутавры по СТО АСЧМ 20-93",
        desc: "Сортамент нормальных, широкополочных и колонных двутавров, характеристики сечения и параметры стыка.",
        ref: "СТО АСЧМ 20-93 · EN 1993-1-1",
        href: "dvutavry-sto.html"
      },
      {
        title: "Листы стальные просечно-вытяжные",
        desc: "Подбор листа по номеру и ширине, предельные нагрузки, параметры сортамента, спецификация по ГОСТ 21.101-97.",
        ref: "ТУ 36.26.11-5-89",
        href: "pv-listy.html"
      },
      {
        title: "Листы стальные рифлёные",
        desc: "Ромбическое и чечевичное рифление: подбор листа, предельные отклонения по толщине, масса, чертежи, условные обозначения.",
        ref: "ГОСТ 8568-77",
        href: "rifl-listy.html"
      },
      {
        title: "Квадратные и прямоугольные трубы по ГОСТ 30245-2012",
        desc: "Квадратные и прямоугольные трубы: подбор по типоразмеру и толщине стенки, площадь, моменты инерции/сопротивления, масса, классы прочности.",
        ref: "ГОСТ 30245-2012",
        href: "trubi.html"
      }
    ]
  },
  {
    title: "Архитектурно-строительные решения",
    items: [
      {
        title: "Устойчивость перегородки",
        desc: "Предельная высота перегородки: классический метод (кирпич, СНиП II-22-81) и Eurocode (СП РК EN 1996-1-1, Приложение F).",
        ref: "СНиП II-22-81 · СП РК EN 1996-1-1",
        href: "peregorodka.html"
      },
      {
        title: "Подбор толщины утеплителя",
        desc: "Расчёт термического сопротивления ограждающей конструкции, проверка на конденсацию (включая профиль температуры в толще стены).",
        ref: "СН РК 2.04-07-2022",
        href: "podbor-uteplitelya.html"
      },
      {
        title: "Кирпич и камень керамические по ГОСТ 530-2012",
        desc: "Конструктор условного обозначения, виды и размеры, марки прочности, классы плотности, расчётное сопротивление сжатию кладки.",
        ref: "ГОСТ 530-2012",
        href: "kirpich-530-2012.html"
      },
      {
        title: "Кирпич, камни, блоки и плиты перегородочные силикатные по ГОСТ 379-2015",
        desc: "Конструктор условного обозначения, виды и размеры, марки прочности и морозостойкости, классы плотности.",
        ref: "ГОСТ 379-2015",
        href: "silikat-379-2015.html"
      }
    ]
  },
  {
    title: "Справочные материалы",
    items: [
      {
        title: "Климатические параметры",
        desc: "Расчётные параметры по СП РК для 44 городов Казахстана: температура, снег, ветер, сейсмика, роза ветров.",
        ref: "SP RK 2.04-01-2017",
        href: "climat.html"
      },
      {
        title: "Конвертер единиц измерения",
        desc: "Перевод между единицами СИ, советских/казахстанских норм и зарубежной практики: сила, давление, момент, длина, площадь, объём, масса, плотность и др.",
        ref: "СИ · ГОСТ 8.417 · Imperial",
        href: "konverter.html"
      }
    ]
  }
];

/* ── Состояние "свёрнуто/развёрнуто" — только в памяти вкладки ── */
const collapsed = new Set(); // хранит id свёрнутых разделов/подразделов

function toggleCollapse(id) {
  if (collapsed.has(id)) collapsed.delete(id);
  else collapsed.add(id);
  render(document.getElementById('search').value);
}

function chevron(id) {
  return `<span class="chevron ${collapsed.has(id) ? 'is-collapsed' : ''}">▾</span>`;
}

function render(filter = "") {
  const container = document.getElementById('toc');
  container.innerHTML = "";
  const q = filter.trim().toLowerCase();
  let totalShown = 0;

  // Проверка соответствия одного калькулятора поисковому запросу
  const matches = (it) => !q ||
    it.title.toLowerCase().includes(q) ||
    it.desc.toLowerCase().includes(q) ||
    it.ref.toLowerCase().includes(q);

  SECTIONS.forEach((section, sIdx) => {
    const sectionNum = sIdx + 1;
    const sectionId = `s${sectionNum}`;

    // Собираем "плоский" список калькуляторов раздела (включая вложенные
    // в группы) — чтобы проверить, есть ли вообще что показать при поиске
    const flatItems = [];
    section.items.forEach(it => it.group ? flatItems.push(...it.items) : flatItems.push(it));
    const anyMatch = flatItems.some(matches);

    if (!anyMatch && (q || flatItems.length > 0)) return;
    totalShown += flatItems.filter(matches).length || 1;

    const sectionEl = document.createElement('div');
    sectionEl.className = 'toc-section';

    const sectionTitle = document.createElement('div');
    sectionTitle.className = 'toc-section-title';
    sectionTitle.innerHTML = `${chevron(sectionId)}<span class="num">${sectionNum}.</span><span>${section.title}</span>`;
    sectionTitle.addEventListener('click', () => toggleCollapse(sectionId));
    sectionEl.appendChild(sectionTitle);

    if (flatItems.length === 0) {
      const empty = document.createElement('div');
      empty.style.cssText = 'padding:4px 4px 4px 34px; color:var(--muted); font-size:12px; font-style:italic;';
      empty.textContent = 'Пока нет калькуляторов';
      sectionEl.appendChild(empty);
      container.appendChild(sectionEl);
      return;
    }

    // Раздел свёрнут — показываем только заголовок раздела
    if (collapsed.has(sectionId) && !q) {
      container.appendChild(sectionEl);
      return;
    }

    let topCounter = 0; // номер верхнеуровневого элемента/группы внутри раздела

    section.items.forEach((entry) => {
      if (entry.group) {
        // ── Подраздел (группа) ──
        const groupFiltered = entry.items.filter(matches);
        if (groupFiltered.length === 0 && q) return;

        topCounter++;
        const groupNum = `${sectionNum}.${topCounter}`;
        const groupId = `${sectionId}-g${topCounter}`;

        const groupTitle = document.createElement('div');
        groupTitle.className = 'toc-group-title';
        groupTitle.innerHTML = `${chevron(groupId)}<span class="num">${groupNum}</span><span>${entry.group}</span>`;
        groupTitle.addEventListener('click', () => toggleCollapse(groupId));
        sectionEl.appendChild(groupTitle);

        if (collapsed.has(groupId) && !q) return;

        groupFiltered.forEach((it) => {
          const itemIdx = entry.items.indexOf(it);
          const itemNum = `${groupNum}.${itemIdx + 1}`;
          sectionEl.appendChild(makeItemEl(it, itemNum, true));
        });
      } else {
        // ── Обычный пункт раздела ──
        if (!matches(entry)) return;
        topCounter++;
        const itemNum = `${sectionNum}.${topCounter}`;
        sectionEl.appendChild(makeItemEl(entry, itemNum, false));
      }
    });

    container.appendChild(sectionEl);
  });

  if (totalShown === 0) {
    container.innerHTML = `<div class="no-results">Ничего не найдено по запросу «${filter}»</div>`;
  }
}

function makeItemEl(it, itemNum, nested) {
  const a = document.createElement('a');
  a.className = nested ? 'toc-item toc-item-nested' : 'toc-item';
  a.href = it.href;
  a.innerHTML = `
    <span class="num">${itemNum}</span>
    <span class="toc-title">${it.title}</span>
    <span class="dots"></span>
    <span class="ref">${it.ref}</span>
  `;
  return a;
}

document.getElementById('search').addEventListener('input', e => render(e.target.value));
render();
</script>

<div id="site-footer"></div>

<script src="site-header.js"></script>
<script src="site-footer.js"></script>

</body>
</html>
